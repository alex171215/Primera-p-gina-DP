<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Práctica Tailwind - Semana 3</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="font-sans text-gray-900">
  <header class="flex justify-between items-center border-b p-4 bg-white">
    <span class="font-bold">MiSitio</span>
    <nav class="space-x-4">
